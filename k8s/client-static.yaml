apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-static
  namespace: sob
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-static
  template:
    metadata:
      labels:
        app: client-static
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          volumeMounts:
            - name: static-files
              mountPath: /usr/share/nginx/html
      volumes:
        - name: static-files
          hostPath:
            path: /mnt/client-public
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: client-static
  namespace: sob
spec:
  selector:
    app: client-static
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
